0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"03a1c4fb-1840-4828-85b2-947b982665f4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --lt-yellow: #FDB913;\n    --lt-green:  #006A44;\n    --lt-red:    #C1272D;\n    --amber:     #D97706;\n    --amber-lt:  #F4C563;\n    --linen:     #F5EBD6;\n    --cream:     #FBF6EC;\n    --ink:       #1A1A1A;\n    --paper:     #F2E4C4;\n    --paper-shadow: #C9B485;\n  }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: 'Space Grotesk', system-ui, sans-serif;\n    background:\n      /* linen weave */\n      repeating-linear-gradient(0deg, rgba(139,110,60,0.04) 0 1px, transparent 1px 3px),\n      repeating-linear-gradient(90deg, rgba(139,110,60,0.04) 0 1px, transparent 1px 3px),\n      radial-gradient(circle at 20% 8%, #FFE9B0 0%, transparent 38%),\n      radial-gradient(circle at 82% 92%, #C6DDC9 0%, transparent 42%),\n      var(--linen);\n    color: var(--ink);\n    min-height: 100vh;\n    overflow-x: hidden;\n  }\n\n  /* --- Juosta (Lithuanian woven sash) pattern --- */\n  .juosta {\n    height: 22px;\n    background-image:\n      /* diamond row */\n      linear-gradient(135deg, transparent 46%, var(--lt-red) 46% 54%, transparent 54%),\n      linear-gradient(45deg,  transparent 46%, var(--lt-red) 46% 54%, transparent 54%),\n      /* green fill */\n      linear-gradient(var(--lt-green), var(--lt-green));\n    background-size: 22px 22px, 22px 22px, 100% 100%;\n    background-repeat: repeat-x, repeat-x, no-repeat;\n    border-top: 2px solid var(--ink);\n    border-bottom: 2px solid var(--ink);\n    position: relative;\n  }\n  .juosta::before, .juosta::after {\n    content: '';\n    position: absolute;\n    left: 0; right: 0;\n    height: 4px;\n    background-image: radial-gradient(circle, var(--lt-yellow) 0 2px, transparent 2.5px);\n    background-size: 10px 4px;\n  }\n  .juosta::before { top: 2px; }\n  .juosta::after  { bottom: 2px; }\n\n  .juosta-wrap {\n    max-width: 1100px;\n    margin: 0 auto;\n    padding: 0 24px;\n  }\n  .serif { font-family: 'Fraunces', serif; }\n\n  /* --- Layout --- */\n  .app {\n    max-width: 1100px;\n    margin: 0 auto;\n    padding: 28px 24px 80px;\n  }\n\n  header.top {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 20px;\n    margin-bottom: 22px;\n  }\n  .brand {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n  }\n  .flag {\n    width: 56px;\n    height: 38px;\n    border-radius: 4px;\n    overflow: hidden;\n    box-shadow: 0 2px 6px rgba(0,0,0,.15);\n    display: flex;\n    flex-direction: column;\n    border: 2px solid var(--ink);\n    flex-shrink: 0;\n  }\n  .flag > div { flex: 1; position: relative; }\n  .flag .y { background: var(--lt-yellow); }\n  .flag .g { background: var(--lt-green); }\n  .flag .r { background: var(--lt-red); }\n  /* tiny Vytis silhouette in center stripe */\n  .flag .g::after {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background: radial-gradient(circle at center, rgba(255,255,255,0.22) 0 3px, transparent 4px);\n  }\n\n  /* Folk-art saulutė (little sun) — used as a brand ornament */\n  .saulute {\n    width: 28px; height: 28px;\n    flex-shrink: 0;\n    color: var(--amber);\n  }\n\n  .title-block .kicker {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    margin-bottom: 4px;\n  }\n  .title-block .kicker-text {\n    font-size: 10px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--amber);\n    font-weight: 700;\n  }\n  .title-block h1 {\n    font-family: 'Fraunces', serif;\n    font-weight: 900;\n    font-size: 32px;\n    margin: 0;\n    line-height: 1.05;\n    letter-spacing: -0.01em;\n  }\n  .title-block h1 .serif-ital {\n    font-style: italic;\n    font-weight: 400;\n    color: var(--lt-red);\n  }\n  .title-block .sub {\n    font-size: 12px;\n    color: #6b6256;\n    margin-top: 5px;\n    letter-spacing: 0.04em;\n    font-style: italic;\n    font-family: 'Fraunces', serif;\n  }\n\n  .board-foot {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 10px;\n    margin-top: 14px;\n    padding-top: 12px;\n    border-top: 1.5px dashed rgba(26,26,26,0.25);\n    font-family: 'Fraunces', serif;\n    font-style: italic;\n    font-size: 13px;\n    color: #6b6256;\n  }\n  .vytis {\n    width: 44px;\n    height: 54px;\n    opacity: 0.95;\n    object-fit: contain;\n    display: block;\n  }\n\n  .stats {\n    display: flex;\n    gap: 10px;\n  }\n  .stat {\n    background: white;\n    border: 1.5px solid var(--ink);\n    border-radius: 10px;\n    padding: 8px 14px;\n    min-width: 80px;\n    text-align: center;\n    box-shadow: 3px 3px 0 var(--ink);\n  }\n  .stat .label {\n    font-size: 10px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: #6b6256;\n  }\n  .stat .value {\n    font-family: 'Fraunces', serif;\n    font-weight: 900;\n    font-size: 22px;\n    line-height: 1.1;\n  }\n  .stat.score .value { color: var(--lt-green); }\n  .stat.hearts .value { color: var(--lt-red); }\n\n  /* --- Poke board --- */\n  .board-wrap {\n    position: relative;\n    background:\n      /* folk diamond corner motifs */\n      radial-gradient(circle at 14px 14px, var(--lt-red) 0 3px, transparent 4px),\n      radial-gradient(circle at calc(100% - 14px) 14px, var(--lt-red) 0 3px, transparent 4px),\n      radial-gradient(circle at 14px calc(100% - 14px), var(--lt-red) 0 3px, transparent 4px),\n      radial-gradient(circle at calc(100% - 14px) calc(100% - 14px), var(--lt-red) 0 3px, transparent 4px),\n      /* linen weave */\n      repeating-linear-gradient(0deg, rgba(139,110,60,0.06) 0 1px, transparent 1px 4px),\n      repeating-linear-gradient(90deg, rgba(139,110,60,0.06) 0 1px, transparent 1px 4px),\n      #FFFDF5;\n    border: 2.5px solid var(--ink);\n    border-radius: 18px;\n    padding: 28px 22px 22px;\n    box-shadow: 6px 6px 0 var(--ink);\n  }\n  /* top & bottom juosta strips on the board */\n  .board-wrap::before, .board-wrap::after {\n    content: '';\n    position: absolute;\n    left: 10px; right: 10px;\n    height: 10px;\n    background-image:\n      linear-gradient(135deg, transparent 44%, var(--lt-red) 44% 56%, transparent 56%),\n      linear-gradient(45deg,  transparent 44%, var(--lt-red) 44% 56%, transparent 56%),\n      linear-gradient(var(--lt-yellow), var(--lt-yellow));\n    background-size: 10px 10px, 10px 10px, 100% 100%;\n    background-repeat: repeat-x, repeat-x, no-repeat;\n    border-top: 1.5px solid var(--ink);\n    border-bottom: 1.5px solid var(--ink);\n  }\n  .board-wrap::before { top: 4px; }\n  .board-wrap::after  { bottom: 4px; }\n  .board-header {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    margin-bottom: 14px;\n    padding: 0 4px;\n  }\n  .board-header h2 {\n    font-family: 'Fraunces', serif;\n    font-weight: 700;\n    font-style: italic;\n    font-size: 20px;\n    margin: 0;\n  }\n  .board-header .hint {\n    font-size: 12px;\n    color: #6b6256;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n  }\n\n  .board {\n    display: grid;\n    gap: 10px;\n    --cols: 5;\n    grid-template-columns: repeat(var(--cols), 1fr);\n  }\n\n  .cell {\n    position: relative;\n    aspect-ratio: 1 / 1;\n    border: none;\n    background: transparent;\n    padding: 0;\n    cursor: pointer;\n    font-family: inherit;\n    perspective: 600px;\n  }\n  .cell:disabled { cursor: default; }\n\n  /* paper face — amber with folk motif */\n  .paper {\n    position: absolute;\n    inset: 0;\n    border-radius: 8px;\n    background:\n      /* folk-art diamond on each corner */\n      linear-gradient(135deg, transparent 85%, var(--lt-red) 85% 88%, transparent 88%) top left   / 18px 18px no-repeat,\n      linear-gradient(225deg, transparent 85%, var(--lt-red) 85% 88%, transparent 88%) top right  / 18px 18px no-repeat,\n      linear-gradient(45deg,  transparent 85%, var(--lt-red) 85% 88%, transparent 88%) bottom left / 18px 18px no-repeat,\n      linear-gradient(315deg, transparent 85%, var(--lt-red) 85% 88%, transparent 88%) bottom right/ 18px 18px no-repeat,\n      /* amber gradient body */\n      radial-gradient(circle at 30% 25%, #FFE7A8 0%, var(--amber-lt) 55%, #E8A63A 100%);\n    border: 2px solid var(--ink);\n    box-shadow:\n      inset 0 0 0 3px rgba(255,255,255,.35),\n      inset 0 -10px 20px rgba(180,90,10,0.25),\n      3px 3px 0 var(--ink);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    transition: transform .15s ease, box-shadow .15s ease;\n    overflow: hidden;\n  }\n  .cell:not(:disabled):hover .paper {\n    transform: translate(-1px, -1px);\n    box-shadow:\n      inset 0 0 0 3px rgba(255,255,255,.4),\n      4px 4px 0 var(--ink);\n  }\n  .cell:not(:disabled):active .paper {\n    transform: translate(2px, 2px);\n    box-shadow:\n      inset 0 0 0 3px rgba(255,255,255,.4),\n      1px 1px 0 var(--ink);\n  }\n\n  .paper .num {\n    font-family: 'Fraunces', serif;\n    font-weight: 900;\n    font-size: clamp(28px, 5.5vw, 52px);\n    color: var(--ink);\n    text-shadow: 1px 1px 0 rgba(255,255,255,0.5);\n    position: relative;\n    z-index: 2;\n  }\n  /* folk-art inner frame with little suns at corners */\n  .paper::after {\n    content: '';\n    position: absolute;\n    inset: 8px;\n    border: 1.5px solid rgba(26,26,26,0.35);\n    border-radius: 4px;\n    pointer-events: none;\n  }\n  /* saulutė (folk sun) behind the number */\n  .paper::before {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background-image:\n      radial-gradient(circle at center, transparent 26%, rgba(26,26,26,0.18) 26.5%, rgba(26,26,26,0.18) 28%, transparent 28.5%),\n      /* 8 rays */\n      conic-gradient(from 0deg,\n        rgba(26,26,26,0.12) 0deg 8deg, transparent 8deg 37deg,\n        rgba(26,26,26,0.12) 37deg 53deg, transparent 53deg 82deg,\n        rgba(26,26,26,0.12) 82deg 98deg, transparent 98deg 127deg,\n        rgba(26,26,26,0.12) 127deg 143deg, transparent 143deg 172deg,\n        rgba(26,26,26,0.12) 172deg 188deg, transparent 188deg 217deg,\n        rgba(26,26,26,0.12) 217deg 233deg, transparent 233deg 262deg,\n        rgba(26,26,26,0.12) 262deg 278deg, transparent 278deg 307deg,\n        rgba(26,26,26,0.12) 307deg 323deg, transparent 323deg 352deg,\n        rgba(26,26,26,0.12) 352deg 360deg);\n    -webkit-mask: radial-gradient(circle at center, black 42%, transparent 43%);\n            mask: radial-gradient(circle at center, black 42%, transparent 43%);\n    opacity: 0.9;\n  }\n\n  /* poked state */\n  .cell.poked .paper {\n    animation: tear .45s ease forwards;\n  }\n  @keyframes tear {\n    0%   { clip-path: polygon(0 0,100% 0,100% 100%,0 100%); opacity: 1; }\n    30%  { clip-path: polygon(0 0, 55% 0, 48% 45%, 62% 55%, 50% 100%, 0 100%); opacity: 1; }\n    100% { clip-path: polygon(0 0, 10% 0, 0 12%, 0 0); opacity: 0; transform: scale(1.05); }\n  }\n\n  /* revealed answer state */\n  .cell.revealed .paper { display: none; }\n  .cell .result {\n    position: absolute;\n    inset: 0;\n    border-radius: 8px;\n    border: 2px solid var(--ink);\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    gap: 4px;\n    font-family: 'Fraunces', serif;\n    font-weight: 900;\n    opacity: 0;\n    transform: scale(.85);\n    transition: opacity .3s ease, transform .3s ease;\n  }\n  .cell.revealed .result { opacity: 1; transform: scale(1); }\n  .cell .result .icon {\n    font-size: 28px;\n    line-height: 1;\n  }\n  .cell .result .label {\n    font-size: 11px;\n    letter-spacing  .q-num {\n    font-family: 'Fraunces', serif;\n    font-weight: 900;\n    font-size: 44px;\n    line-height: 1;\n    margin: 10px 0 4px;\n    color: var(--ink);\n  }\n  .q-num .of {\n    font-size: 18px;\n    color: #8a7f6d;\n    font-weight: 700;\n  }\n  .q-text {\n    font-family: 'Fraunces', serif;\n    font-weight: 700;\n    font-size: 24px;\n    line-height: 1.25;\n    margin: 8px 0 20px;\n    text-wrap: pretty;\n  }\n\n  .choices {\n    display: grid;\n    gap: 10px;\n  }\n  .choice {\n    text-align: left;\n    background: #fff;\n    border: 2px solid var(--ink);\n    border-radius: 10px;\n    padding: 13px 16px;\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 16px;\n    font-weight: 500;\n    cursor: pointer;\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    transition: transform .1s ease, box-shadow .1s ease, background .15s ease;\n    box-shadow: 3px 3px 0 var(--ink);\n  }\n  .choice .letter {\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    width: 28px;\n    height: 28px;\n    background: var(--paper);\n    border: 1.5px solid var(--ink);\n    border-radius: 6px;\n    font-family: 'Fraunces', serif;\n    font-weight: 900;\n    font-size: 14px;\n    flex-shrink: 0;\n  }\n  .choice:hover:not(:disabled) {\n    transform: translate(-1px,-1px);\n    box-shadow: 4px 4px 0 var(--ink);\n    background: #FFFBEF;\n  }\n  .choice:active:not(:disabled) {\n    transform: translate(1px,1px);\n    box-shadow: 2px 2px 0 var(--ink);\n  }\n  .choice:disabled { cursor: default; }\n  .choice.right {\n    background: var(--lt-green);\n    color: #fff;\n  }\n  .choice.right .letter { background: #fff; color: var(--lt-green); }\n  .choice.wrong {\n    background: var(--lt-red);\n    color: #fff;\n  }\n  .choice.wrong .letter { background: #fff; color: var(--lt-red); }\n\n  .explain {\n    margin-top: 14px;\n    padding: 12px 14px;\n    background: #fff;\n    border: 1.5px solid var(--ink);\n    border-radius: 10px;\n    font-size: 14px;\n    line-height: 1.45;\n    display: flex;\n    gap: 10px;\n    align-items: flex-start;\n    max-height: 0;\n    opacity: 0;\n    overflow: hidden;\n    padding-top: 0;\n    padding-bottom: 0;\n    border-width: 0;\n    transition: all .25s ease;\n  }\n  .explain.show {\n    max-height: 200px;\n    opacity: 1;\n    padding: 12px 14px;\n    border-width: 1.5px;\n  }\n  .explain .ico {\n    font-family: 'Fraunces', serif;\n    font-weight: 900;\n    font-size: 18px;\n    background: var(--lt-yellow);\n    border: 1.5px solid var(--ink);\n    border-radius: 6px;\n    width: 26px;\n    height: 26px;\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    flex-shrink: 0;\n  }\n\n  .modal-foot {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    margin-top: 18px;\n  }\n  .next-btn {\n    background: var(--ink);\n    color: var(--cream);\n    border: 2px solid var(--ink);\n    border-radius: 10px;\n    padding: 12px 22px;\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 700;\n    font-size: 14px;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    cursor: pointer;\n    box-shadow: 3px 3px 0 var(--lt-yellow);\n    transition: transform .1s ease, box-shadow .1s ease;\n    opacity: 0;\n    pointer-events: none;\n  }\n  .next-btn.show {\n    opacity: 1;\n    pointer-events: auto;\n  }\n  .next-btn:hover {\n    transform: translate(-1px,-1px);\n    box-shadow: 4px 4px 0 var(--lt-yellow);\n  }\n  .next-btn:active {\n    transform: translate(1px,1px);\n    box-shadow: 2px 2px 0 var(--lt-yellow);\n  }\n\n  /* --- Final screen --- */\n  .final {\n    position: fixed;\n    inset: 0;\n    background: var(--cream);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    z-index: 60;\n    opacity: 0;\n    pointer-events: none;\n    transition: opacity .35s ease;\n    padding: 24px;\n  }\n  .final.show { opacity: 1; pointer-events: h1><span class=\"serif-ital\">Prašom<\u002Fspan> — Poke the <span style=\"color:var(--lt-green)\">Lithuania<\u002Fspan> Quiz<\u002Fh1>\n        <div class=\"sub\">Pasirinkite · Pick a square · Tear through the paper · Answer true<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stats\">\n      <div class=\"stat score\"><div class=\"label\">Taškai<\u002Fdiv><div class=\"value\" id=\"score\">0<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"label\">Atverta<\u002Fdiv><div class=\"value\" id=\"poked\">0/9<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat hearts\"><div class=\"label\">Gyvybės<\u002Fdiv><div class=\"value\" id=\"lives\">♥♥♥<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"board-wrap\">\n    <div class=\"board-header\">\n      <h2>Audinys · <span style=\"font-style:normal; color:var(--lt-green)\" id=\"board-count\">9 squares<\u002Fspan> of amber<\u002Fh2>\n      <div class=\"hint\">↓ Pasirink skaičių ↓<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"board\" id=\"board\"><\u002Fdiv>\n    <div class=\"board-foot\">\n      <img class=\"vytis\" src=\"f4cdd181-b424-4e65-9031-b68a01d6ab96\" alt=\"Vytis coat of arms\">\n      <span><b style=\"color:#1A1A1A; font-style:normal\">Vytis<\u002Fb> — the white knight. Pick bravely.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Juosta sash bottom border -->\n<div class=\"juosta-wrap\" style=\"padding-bottom:12px\"><div class=\"juosta\"><\u002Fdiv><\u002Fdiv>\n\n<!-- Question modal -->\n<div class=\"modal-backdrop\" id=\"modal\">\n  <div class=\"modal\">\n    <div class=\"q-tag\"><span class=\"dot\"><\u002Fspan> <span id=\"q-topic\">TOPIC<\u002Fspan><\u002Fdiv>\n    <div class=\"q-num\">#<span id=\"q-num\">1<\u002Fspan><span class=\"of\"> / 25<\u002Fspan><\u002Fdiv>\n    <div class=\"q-text serif\" id=\"q-text\">Question goes here<\u002Fdiv>\n    <div class=\"choices\" id=\"choices\"><\u002Fdiv>\n    <div class=\"explain\" id=\"explain\">\n      <span class=\"ico\">i<\u002Fspan>\n      <span id=\"explain-text\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"modal-foot\">\n      <div style=\"font-size:12px; color:#6b6256; letter-spacing:.06em; text-transform:uppercase;\">\n        <span id=\"feedback-label\">Take your time<\u002Fspan>\n      <\u002Fdiv>\n      <button class=\"next-btn\" id=\"next-btn\">Next →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Final screen -->\n<div class=\"final\" id=\"final\">\n  <div class=\"final-card\">\n    <div class=\"medal\" id=\"medal\"><img src=\"f4cdd181-b424-4e65-9031-b68a01d6ab96\" alt=\"Vytis\" style=\"width:78%; height:78%; object-fit:contain;\"><\u002Fdiv>\n    <div class=\"tag\">Rezultatas · Final Result<\u002Fdiv>\n    <h2 id=\"final-title\">Labai gerai!<\u002Fh2>\n    <div class=\"score-line\">You scored <b><span id=\"final-score\">0<\u002Fspan><\u002Fb> / <span id=\"final-total\">25<\u002Fspan><\u002Fdiv>\n    <div class=\"msg\" id=\"final-msg\"><\u002Fdiv>\n    <button class=\"restart\" id=\"restart\">Dar kartą · Play Again<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Tweaks -->\n<div class=\"tweaks\" id=\"tweaks\">\n  <h3>Tweaks <button class=\"close\" id=\"tweaks-close\">×<\u002Fbutton><\u002Fh3>\n  <div class=\"tweak\">\n    <label>Theme<\u002Flabel>\n    <div class=\"theme-row\" id=\"theme-row\">\n      <div class=\"sw\" data-theme=\"flag\" style=\"background:linear-gradient(to bottom,#FDB913 33%,#006A44 33% 66%,#C1272D 66%)\" title=\"Flag\"><\u002Fdiv>\n      <div class=\"sw\" data-theme=\"amber\" style=\"background:#FDB913\" title=\"Amber\"><\u002Fdiv>\n      <div class=\"sw\" data-theme=\"forest\" style=\"background:#006A44\" title=\"Forest\"><\u002Fdiv>\n      <div class=\"sw\" data-theme=\"night\" style=\"background:#1A1A1A\" title=\"Night\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tweak\">\n    <label>Grid size<\u002Flabel>\n    <div class=\"grid-row\" id=\"grid-row\">\n      <button data-cols=\"3\" class=\"on\">3×3<\u002Fbutton>\n      <button data-cols=\"4\">4×4<\u002Fbutton>\n      <button data-cols=\"5\">5×5<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tweak\">\n    <label>Lives<\u002Flabel>\n    <div class=\"grid-row\" id=\"lives-row\">\n      <button data-lives=\"0\">∞<\u002Fbutton>\n      <button data-lives=\"3\" class=\"on\">3<\u002Fbutton>\n      <button data-lives=\"5\">5<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tweak\">\n    <button class=\"full\" id=\"reset-btn\">Reset Game<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ---------- Question bank ---------- */\nconst QUESTIONS = [\n  { topic: 'Language', q: 'What language do Lithuanians speak?',\n    choices: ['Lithuanian', 'Russian', 'Polish', 'Latvian'], answer: 0,\n    explain: 'Lithuanian is one of the oldest living Indo-European languages — a cousin of Sanskrit.' },\n  { topic: 'Capital', q: 'What is the capital of Lithuania?',\n    choices: ['Kaunas', 'Klaipėda', 'Vilnius', 'Šiauliai'], answer: 2,\n    explain: 'Vilnius has been the capital since the 14th century; its Old Town is a UNESCO site.' },\n  { topic: 'Population', q: 'About how many people live in Lithuania?',\n    choices: ['~800 thousand', '~2.9 million', '~6 million', '~11 million'], answer: 1,\n    explain: 'Around 2.9 million as of recent estimates.' },\n  { topic: 'Flag', q: 'Which three colors are on the Lithuanian flag (top to bottom)?',\n    choices: ['Blue, white, red', 'Yellow, green, red', 'Red, white, green', 'White, blue, yellow'], answer: 1,\n    explain: 'Yellow (sun/prosperity), green (nature/hope), red (blood/courage).' },\n  { topic: 'Currency', q: 'What currency does Lithuania use?',\n    choices: ['Litas', 'Euro', 'Zloty', 'Ruble'], answer: 1,\n    explain: 'Lithuania adopted the Euro in 2015, replacing the litas.' },\n  { topic: 'Geography', q: 'Which sea does Lithuania border?',\n    choices: ['Black Sea', 'North Sea', 'Baltic Sea', 'Mediterranean'], answer: 2,\n    explain: 'About 90 km of Baltic coastline — home to the Curonian Spit.' },\n  { topic: 'Sports', q: 'Which sport is practically a national religion in Lithuania?',\n    choices: ['Football', 'Ice hockey', 'Basketball', 'Rugby'], answer: 2,\n    explain: 'Basketball — multiple EuroBasket titles and NBA stars like Sabonis.' },\n  { topic: 'History', q: 'In what year did Lithuania restore independence from the USSR?',\n    choices: ['1989', '1990', '1991', '1993'], answer: 1,\n    explain: 'March 11, 1990 — the first Soviet republic to declare independence.' },\n  { topic: 'Culture', q: 'What is \"cepelinai\"?',\n    choices: ['A folk dance', 'Potato dumplings', 'A wooden flute', 'A beer festival'], answer: 1,\n    explain: 'Zeppelin-shaped potato dumplings stuffed with meat — the national dish.' },\n  { topic: 'Geography', q: 'Which countries border Lithuania?',\n    choices: ['Russia, Poland, Latvia, Belarus', 'Germany, Poland, Latvia', 'Finland, Sweden, Estonia', 'Ukraine, Belarus, Poland'], answer: 0,\n    explain: 'Latvia (N), Belarus (E/S), Poland (SW), and Russia/Kaliningrad (W).' },\n  { topic: 'Nature', q: 'What famous gem washes up on Lithuania\\'s Baltic beaches?',\n    choices: ['Pearl', 'Amber', 'Jade', 'Opal'], answer: 1,\n    explain: 'Baltic amber — fossilized tree resin, often called \"Lithuanian gold.\"' },\n  { topic: 'Landmark', q: 'What is the \"Hill of Crosses\"?',\n    choices: ['A war memorial', 'A pilgrimage site with 100,000+ crosses', 'A ski resort', 'A medieval castle'], answer: 1,\n    explain: 'Near Šiauliai — a Catholic pilgrimage site visited by Pope John Paul II.' },\n  { topic: 'Language', q: 'How do you say \"hello\" in Lithuanian?',\n    choices: ['Privet', 'Labas', 'Sveiki', 'Ahoj'], answer: 1,\n    explain: '\"Labas\" is casual; \"Sveiki\" is a more formal greeting (also accepted!).' },\n  { topic: 'Size', q: 'How big is Lithuania (area)?',\n    choices: ['~25,000 km²', '~65,000 km²', '~150,000 km²', '~300,000 km²'], answer: 1,\n    explain: '~65,300 km² — similar in size to Ireland or West Virginia.' },\n  { topic: 'Music', q: 'M.K. Čiurlionis was a famous Lithuanian...',\n    choices: ['Football player', 'Painter & composer', 'Chess grandmaster', 'Astronaut'], answer: 1,\n    explain: 'Mikalojus Konstantinas Čiurlionis (1875–1911) — symbolist painter & composer.' },\n  { topic: 'Food', q: 'What is \"šaltibarščiai\"?',\n    choices: ['Hot chili soup', 'A bright pink cold beet soup', 'Smoked fish', 'A honey cake'], answer: 1,\n    explain: 'Neon-pink cold beetroot soup with kefir — a summer favorite.' },\n  { topic: 'History', q: 'The Grand Duchy of Lithuania was once one of the largest states in Europe. Peak era?',\n    choices: ['10th century', '14th–15th century', '17th century', '19th century'], answer: 1,\n    explain: 'At its peak it stretched from the Baltic nearly to the Black Sea.' },\n  { topic: 'Symbol', q: 'What animal appears on the Lithuanian coat of arms?',\n    choices: ['Double-headed eagle', 'A white knight on horseback (Vytis)', 'A brown bear', 'A lynx'], answer: 1,\n    explain: '\"Vytis\" — a knight in armor on horseback, sword raised. One of Europe\\'s oldest coats of arms.' },\n  { topic: 'Nature', q: 'Which is Lithuania\\'s longest river?',\n    choices: ['Daugava', 'Nemunas', 'Vistula', 'Dnieper'], answer: 1,\n    explain: 'The Nemunas — 937 km total, ~475 km inside Lithuania.' },\n  { topic: 'EU', q: 'When did Lithuania join the European Union?',\n    choices: ['1999', '2004', '2007', '2013'], answer: 1,\n    explain: 'May 1, 2004 — along with 9 other countries in the \"big bang\" enlargement.' },\n  { topic: 'Trivia', q: 'Lithuania is home to the geographic center of...',\n    choices: ['Europe', 'Scandinavia', 'Eurasia', 'The EU'], answer: 0,\n    explain: 'A 1989 French National Geographic Institute study placed it near Purnuškės, ~26 km north of Vilnius.' },\n  { topic: 'Climate', q: 'Lithuania\\'s climate is best described as...',\n    choices: ['Mediterranean', 'Humid continental with 4 seasons', 'Subarctic', 'Tropical'], answer: 1,\n    explain: 'Cold snowy winters, warm summers — real seasons.' },\n  { topic: 'Festival', q: 'What is \"Joninės\"?',\n    choices: ['A winter sled race', 'Midsummer / St. John\\'s night festival', 'A beer-brewing contest', 'An opera festival'], answer: 1,\n    explain: 'Midsummer bonfires, flower crowns, jumping over fire — celebrated June 23–24.' },\n  { topic: 'Legend', q: 'According to legend, Vilnius was founded after what dream?',\n    choices: ['A golden fish', 'An iron wolf howling on a hill', 'A flying eagle', 'A talking oak'], answer: 1,\n    explain: 'Grand Duke Gediminas dreamt of an iron wolf howling — his priest read it as a sign to build a city.' },\n  { topic: 'Fun', q: 'Which of these is a real Lithuanian export?',\n    choices: ['Green laser tech', 'Amber jewelry', 'Cepelinai (frozen)', 'All of the above'], answer: 3,\n    explain: 'Lithuania is a world leader in femtosecond lasers — plus amber & food exports.' },\n];\n\n/* ---------- State ---------- */\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"theme\": \"flag\",\n  \"cols\": 3,\n  \"lives\": 3\n}/*EDITMODE-END*/;\n\nlet state = {\n  theme: TWEAK_DEFAULTS.theme,\n  cols: TWEAK_DEFAULTS.cols,\n  startingLives: TWEAK_DEFAULTS.lives,\n  lives: TWEAK_DEFAULTS.lives,\n  score: 0,\n  poked: 0,\n  order: [],     // question index for each cell\n  cellStatus: [],// null | 'correct' | 'wrong'\n  currentCell: null,\n  answered: false,\n};\n\nfunction shuffle(arr) {\n  const a = arr.slice();\n  for (let i = a.length - 1; i > 0; i--) {\n    const j = Math.floor(Math.random() * (i + 1));\n    [a[i], a[j]] = [a[j], a[i]];\n  }\n  return a;\n}\n\nfunction totalCells() {\n  // 3x3=9, 4x4=16, 5x5=25\n  if (state.cols === 3) return 9;\n  if (state.cols === 4) return 16;\n  return 25;\n}\n\n/* ---------- Rendering ---------- */\nconst boardEl = document.getElementById('board');\n\nfunction buildBoard() {\n  const n = totalCells();\n  // Generate question order: shuffle and take first n; if n > 25, cycle\n  const base = shuffle(QUESTIONS.map((_, i) => i));\n  const order = [];\n  for (let i = 0; i < n; i++) order.push(base[i % base.length]);\n  state.order = order;\n  state.cellStatus = Array(n).fill(null);\n  state.score = 0;\n  state.poked = 0;\n  state.lives = state.startingLives;\n  state.currentCell = null;\n  state.answered = false;\n\n  boardEl.style.setProperty('--cols', state.cols);\n  boardEl.style.gridTemplateColumns = `repeat(${state.cols}, 1fr)`;\n\n  boardEl.innerHTML = '';\n  for (let i = 0; i < n; i++) {\n    const btn = document.createElement('button');\n    btn.className = 'cell';\n    btn.dataset.idx = i;\n    btn.innerHTML = `\n      <div class=\"paper\"><span class=\"num\">${i+1}<\u002Fspan><\u002Fdiv>\n      <div class=\"result\"><span class=\"icon\"><\u002Fspan><span class=\"label\"><\u002Fspan><\u002Fdiv>\n    `;\n    btn.addEventListener('click', () => onCellClick(i));\n    boardEl.appendChild(btn);\n  }\n\n  const bc = document.getElementById('board-count');\n  if (bc) bc.textContent = `${n} squares`;\n  updateStats();\n}\n\nfunction updateStats() {\n  document.getElementById('score').textContent = state.score;\n  document.getElementById('poked').textContent = `${state.poked}/${totalCells()}`;\n  const livesEl = document.getElementById('lives');\n  if (state.startingLives === 0) {\n    livesEl.textContent = '∞';\n  } else {\n    livesEl.textContent = '♥'.repeat(state.lives) + '♡'.repeat(Math.max(0, state.startingLives - state.lives));\n  }\n}\n\n/* ---------- Question flow ---------- */\nconst modal = document.getElementById('modal');\nconst qTopic = document.getElementById('q-topic');\nconst qNum   = document.getElementById('q-num');\nconst qText  = document.getElementById('q-text');\nconst choicesEl = document.getElementById('choices');\nconst explainEl = document.getElementById('explain');\nconst explainText = document.getElementById('explain-text');\nconst nextBtn = document.getElementById('next-btn');\nconst feedbackLabel = document.getElementById('feedback-label');\n\nfunction onCellClick(i) {\n  if (state.cellStatus[i] !== null) return;        // already answered\n  if (state.currentCell !== null) return;          // a question is already open\n  const cell = boardEl.children[i];\n  cell.classList.add('poked', 'active');\n  state.currentCell = i;\n\n  // wait for tear animation, then show modal\n  setTimeout(() => {\n    openQuestion(i);\n  }, 420);\n}\n\nfunction openQuestion(i) {\n  const qIdx = state.order[i];\n  const q = QUESTIONS[qIdx];\n  qTopic.textContent = q.topic;\n  qNum.textContent = i + 1;\n  document.querySelector('.q-num .of').textContent = ` / ${totalCells()}`;\n  qText.textContent = q.q;\n  feedbackLabel.textContent = 'Pick an answer';\n  explainEl.classList.remove('show');\n  nextBtn.classList.remove('show');\n  state.answered = false;\n\n  choicesEl.innerHTML = '';\n  q.choices.forEach((c, ci) => {\n    const b = document.createElement('button');\n    b.className = 'choice';\n    b.innerHTML = `<span class=\"letter\">${String.fromCharCode(65+ci)}<\u002Fspan><span>${c}<\u002Fspan>`;\n    b.addEventListener('click', () => pickAnswer(ci, q, i));\n    choicesEl.appendChild(b);\n  });\n\n  explainText.textContent = q.explain;\n  modal.classList.add('open');\n}\n\nfunction pickAnswer(ci, q, cellIdx) {\n  if (state.answered) return;\n  state.answered = true;\n  const buttons = choicesEl.querySelectorAll('.choice');\n  buttons.forEach((b, idx) => {\n    b.disabled = true;\n    if (idx === q.answer) b.classList.add('right');\n    if (idx === ci && ci !== q.answer) b.classList.add('wrong');\n  });\n\n  const correct = ci === q.answer;\n  if (correct) {\n    state.score += 1;\n    state.cellStatus[cellIdx] = 'correct';\n    feedbackLabel.textContent = '✓ Correct!';\n    feedbackLabel.style.color = 'var(--lt-green)';\n    fireConfetti();\n  } else {\n    state.cellStatus[cellIdx] = 'wrong';\n    if (state.startingLives > 0) state.lives = Math.max(0, state.lives - 1);\n    feedbackLabel.textContent = '✗ Not quite';\n    feedbackLabel.style.color = 'var(--lt-red)';\n  }\n  state.poked += 1;\n  updateStats();\n\n  explainEl.classList.add('show');\n  nextBtn.classList.add('show');\n}\n\nnextBtn.addEventListener('click', () => {\n  const i = state.currentCell;\n  const cell = boardEl.children[i];\n  cell.classList.remove('active');\n  cell.classList.add('revealed', state.cellStatus[i]);\n  const icon = cell.querySelector('.result .icon');\n  const lbl  = cell.querySelector('.result .label');\n  icon.textContent = state.cellStatus[i] === 'correct' ? '✓' : '✗';\n  lbl.textContent  = state.cellStatus[i] === 'correct' ? 'GOT IT' : 'MISS';\n\n  modal.classList.remove('open');\n  state.currentCell = null;\n\n  // game over checks\n  setTimeout(() => {\n    if (state.startingLives > 0 && state.lives <= 0) {\n      showFinal(true);\n    } else if (state.poked >= totalCells()) {\n      showFinal(false);\n    }\n  }, 300);\n});\n\n/* close modal on backdrop click (but only after answering) */\nmodal.addEventListener('click', (e) => {\n  if (e.target === modal && state.answered) nextBtn.click();\n});\n\n/* ---------- Final ---------- */\nfunction showFinal(outOfLives) {\n  const finalEl = document.getElementById('final');\n  const total = totalCells();\n  document.getElementById('final-score').textContent = state.score;\n  document.getElementById('final-total').textContent = total;\n  const pct = state.score / total;\n  let title = 'Labai gerai!', msg = '', medal = '🥇';\n  if (outOfLives) {\n    title = 'Game Over';\n    msg = `You used all your lives with ${state.score} correct. Want another round?`;\n    medal = '💔';\n  } else if (pct >= 0.9) {\n    title = 'Puikiai! (Excellent!)';\n    msg = 'A true Lithuania scholar. Sabonis would be proud.';\n    medal = '🥇';\n  } else if (pct >= 0.7) {\n    title = 'Labai gerai! (Very good!)';\n    msg = 'Solid run. A few tricky ones got by you — worth another go.';\n    medal = '🥈';\n  } else if (pct >= 0.4) {\n    title = 'Neblogai! (Not bad!)';\n    msg = 'Middle of the road. Brush up on history & geography for round two.';\n    medal = '🥉';\n  } else {\n    title = 'Try Again';\n    msg = 'Lithuania has a lot to discover. One more round and you\\'ll get it.';\n    medal = '📚';\n  }\n  document.getElementById('final-title').textContent = title;\n  document.getElementById('final-msg').textContent = msg;\n  document.getElementById('medal').textContent = medal;\n  finalEl.classList.add('show');\n}\n\ndocument.getElementById('restart').addEventListener('click', () => {\n  document.getElementById('final').classList.remove('show');\n  buildBoard();\n});\n\n/* ---------- Confetti ---------- */\nfunction fireConfetti() {\n  const colors = ['#FDB913', '#006A44', '#C1272D', '#1A1A1A'];\n  for (let i = 0; i < 26; i++) {\n    const p = document.createElement('div');\n    p.className = 'confetti-piece';\n    p.style.background = colors[i % colors.length];\n    p.style.left = (40 + Math.random()*20) + '%';\n    p.style.top = '40%';\n    p.style.transform = `rotate(${Math.random()*360}deg)`;\n    document.body.appendChild(p);\n    const dx = (Math.random() - 0.5) * 500;\n    const dy = (Math.random() * 400) + 200;\n    const rot = (Math.random() - 0.5) * 720;\n    p.animate([\n      { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },\n      { transform: `translate(${dx}px, ${dy}px) rotate(${rot}deg)`, opacity: 0 }\n    ], { duration: 1100 + Math.random()*500, easing: 'cubic-bezier(.2,.7,.3,1)' });\n    setTimeout(() => p.remove(), 1800);\n  }\n}\n\n/* ---------- Tweaks ---------- */\nconst tweaksEl = document.getElementById('tweaks');\ndocument.getElementById('tweaks-close').addEventListener('click', () => {\n  tweaksEl.classList.remove('open');\n});\n\n/* theme swatches */\nfunction applyTheme(name) {\n  const root = document.documentElement;\n  root.style.setProperty('--cream', '#FBF6EC');\n  document.body.style.color = '';\n  if (name === 'amber') {\n    root.style.setProperty('--cream', '#FFF6DC');\n  } else if (name === 'forest') {\n    root.style.setProperty('--cream', '#E8F1E8');\n  } else if (name === 'night') {\n    root.style.setProperty('--cream', '#1A1A1A');\n    document.body.style.color = '#FBF6EC';\n  } else {\n    // flag default\n    root.style.setProperty('--cream', '#FBF6EC');\n  }\n  document.querySelectorAll('#theme-row .sw').forEach(sw => {\n    sw.classList.toggle('on', sw.dataset.theme === name);\n  });\n  state.theme = name;\n  persist({ theme: name });\n}\ndocument.querySelectorAll('#theme-row .sw').forEach(sw => {\n  sw.addEventListener('click', () => applyTheme(sw.dataset.theme));\n});\n\n/* grid size */\ndocument.querySelectorAll('#grid-row button').forEach(b => {\n  b.addEventListener('click', () => {\n    document.querySelectorAll('#grid-row button').forEach(x => x.classList.remove('on'));\n    b.classList.add('on');\n    state.cols = parseInt(b.dataset.cols, 10);\n    persist({ cols: state.cols });\n    buildBoard();\n  });\n});\n\n/* lives */\ndocument.querySelectorAll('#lives-row button').forEach(b => {\n  b.addEventListener('click', () => {\n    document.querySelectorAll('#lives-row button').forEach(x => x.classList.remove('on'));\n    b.classList.add('on');\n    state.startingLives = parseInt(b.dataset.lives, 10);\n    state.lives = state.startingLives;\n    persist({ lives: state.startingLives });\n    updateStats();\n  });\n});\n\ndocument.getElementById('reset-btn').addEventListener('click', () => {\n  document.getElementById('final').classList.remove('show');\n  buildBoard();\n});\n\n/* ---------- Host-driven Tweaks toggle ---------- */\nfunction persist(edits) {\n  try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch(e){}\n}\nwindow.addEventListener('message', (ev) => {\n  const d = ev.data || {};\n  if (d.type === '__activate_edit_mode')   tweaksEl.classList.add('open');\n  if (d.type === '__deactivate_edit_mode') tweaksEl.classList.remove('open');\n});\ntry { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e){}\n\n/* ---------- Init ---------- */\napplyTheme(state.theme);\n// reflect starting selections in tweak panel\ndocument.querySelectorAll('#grid-row button').forEach(x => x.classList.toggle('on', parseInt(x.dataset.cols,10) === state.cols));\ndocument.querySelectorAll('#lives-row button').forEach(x => x.classList.toggle('on', parseInt(x.dataset.lives,10) === state.startingLives));\nbuildBoard();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
